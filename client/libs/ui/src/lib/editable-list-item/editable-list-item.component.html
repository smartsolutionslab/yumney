<div class="editable-list-item" *transloco="let t">
  <div class="item-content">
    <ng-content />
  </div>

  <div class="item-actions">
    <button
      type="button"
      class="btn-icon"
      [disabled]="isFirst()"
      (click)="moveUp.emit()"
      [attr.aria-label]="t('shared.editableList.moveUp')"
    >
      <lucide-icon name="chevron-up" [size]="18" />
    </button>
    <button
      type="button"
      class="btn-icon"
      [disabled]="isLast()"
      (click)="moveDown.emit()"
      [attr.aria-label]="t('shared.editableList.moveDown')"
    >
      <lucide-icon name="chevron-down" [size]="18" />
    </button>
    <button type="button" class="btn-icon btn-icon--danger" (click)="remove.emit()" [attr.aria-label]="t('shared.editableList.remove')">
      <lucide-icon name="x" [size]="18" />
    </button>
  </div>
</div>
