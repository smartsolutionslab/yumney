<div class="editable-list-item" *transloco="let t">
  <div class="item-content">
    <ng-content />
  </div>

  <div class="item-actions">
    <button
      type="button"
      class="btn-icon"
      [disabled]="isFirst()"
      (click)="moveUp.emit()"
      [attr.aria-label]="t('shared.editableList.moveUp')"
    >
      &#9650;
    </button>
    <button
      type="button"
      class="btn-icon"
      [disabled]="isLast()"
      (click)="moveDown.emit()"
      [attr.aria-label]="t('shared.editableList.moveDown')"
    >
      &#9660;
    </button>
    <button
      type="button"
      class="btn-icon btn-icon--danger"
      (click)="remove.emit()"
      [attr.aria-label]="t('shared.editableList.remove')"
    >
      &times;
    </button>
  </div>
</div>
