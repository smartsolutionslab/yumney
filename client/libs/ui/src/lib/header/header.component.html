<header
  ynClickOutside
  (clickOutside)="onDismissMenu()"
  (escape)="onDismissMenu()"
  *transloco="let t"
>
  <div class="header-content">
    <a class="brand" routerLink="/">Yumney</a>

    <nav [attr.aria-label]="t('layout.header.navigation')">
      @if (authService.isAuthenticated()) {
        <a [routerLink]="ROUTES.recipes.list" class="nav-link">
          <lucide-icon name="book-open" [size]="18" class="nav-icon" />
          <span class="nav-label">{{ t('layout.header.recipes') }}</span>
        </a>
        <a [routerLink]="ROUTES.recipes.cookable" class="nav-link">
          <lucide-icon name="chef-hat" [size]="18" class="nav-icon" />
          <span class="nav-label">{{ t('layout.header.cookable') }}</span>
        </a>
        <a [routerLink]="ROUTES.shopping.list" class="nav-link">
          <lucide-icon name="shopping-cart" [size]="18" class="nav-icon" />
          <span class="nav-label">{{ t('layout.header.shoppingLists') }}</span>
        </a>
        <a [routerLink]="ROUTES.mealPlanner" class="nav-link">
          <lucide-icon name="calendar-days" [size]="18" class="nav-icon" />
          <span class="nav-label">{{ t('layout.header.mealPlanner') }}</span>
        </a>

        <button
          class="icon-button"
          (click)="onToggleChat()"
          [attr.aria-label]="t('layout.header.openChat')"
        >
          <lucide-icon name="message-square" [size]="20" />
        </button>

        <div class="avatar-wrapper">
          <button
            class="avatar-button"
            data-testid="user-menu-toggle"
            (click)="onToggleMenu()"
            [attr.aria-expanded]="menuOpen()"
            [attr.aria-label]="t('layout.header.settings')"
          >
            <span class="user-avatar">{{ authService.userInitial() }}</span>
          </button>

          @if (menuOpen()) {
            <div class="user-dropdown" role="menu">
              <div class="dropdown-header">
                <span class="dropdown-name">{{ authService.displayName() }}</span>
              </div>

              <div class="dropdown-divider"></div>

              <button class="dropdown-item" (click)="onToggleTheme()" role="menuitem">
                @if (isDark()) {
                  <lucide-icon name="sun" [size]="18" />
                  <span>{{ t('layout.header.switchToLight') }}</span>
                } @else {
                  <lucide-icon name="moon" [size]="18" />
                  <span>{{ t('layout.header.switchToDark') }}</span>
                }
              </button>

              <button
                class="dropdown-item"
                data-testid="lang-switch"
                [attr.data-current-lang]="currentLanguage()"
                [attr.data-next-lang]="nextLanguage()"
                (click)="onSwitchLanguage()"
                role="menuitem"
              >
                <lucide-icon name="languages" [size]="18" />
                <span>{{ t(nextLanguageKey()) }}</span>
              </button>

              <div class="dropdown-divider"></div>

              <button
                class="dropdown-item dropdown-item--danger"
                data-testid="logout"
                (click)="onLogout()"
                role="menuitem"
              >
                <lucide-icon name="log-out" [size]="18" />
                <span>{{ t('layout.header.logout') }}</span>
              </button>
            </div>
          }
        </div>
      } @else {
        <a [routerLink]="ROUTES.auth.login" class="login-link">
          {{ t('layout.header.login') }}
        </a>
      }
    </nav>
  </div>
</header>
