<header *transloco="let t">
  <div class="header-content">
    <a class="brand" routerLink="/">Yumney</a>
    <nav [attr.aria-label]="t('layout.header.navigation')">
      @if (authService.isAuthenticated()) {
        <a [routerLink]="ROUTES.recipes.list" class="nav-link">
          {{ t('layout.header.myRecipes') }}
        </a>
        <a [routerLink]="ROUTES.shopping.list" class="nav-link">
          {{ t('layout.header.shoppingLists') }}
        </a>
        <div class="user-menu">
          <span class="user-avatar" [attr.aria-label]="authService.displayName()">
            {{ authService.userInitial() }}
          </span>
          <span class="user-name">{{ authService.shortName() }}</span>
          <button class="logout-button" (click)="onLogout()">
            {{ t('layout.header.logout') }}
          </button>
        </div>
      } @else {
        <a [routerLink]="ROUTES.auth.login" class="login-link">
          {{ t('layout.header.login') }}
        </a>
      }
      @if (authService.isAuthenticated()) {
        <button
          class="chat-toggle"
          (click)="onToggleChat()"
          [attr.aria-label]="t('layout.header.openChat')"
        >
          <lucide-icon name="message-square" [size]="20" />
        </button>
      }
      <button
        class="theme-toggle"
        (click)="onToggleTheme()"
        [attr.aria-label]="
          isDark() ? t('layout.header.switchToLight') : t('layout.header.switchToDark')
        "
      >
        @if (isDark()) {
          <lucide-icon name="sun" [size]="20" />
        } @else {
          <lucide-icon name="moon" [size]="20" />
        }
      </button>
      <button
        class="lang-toggle"
        (click)="onSwitchLanguage()"
        [attr.aria-label]="t('layout.header.switchLanguage')"
      >
        {{ t(nextLanguageKey()) }}
      </button>
    </nav>
  </div>
</header>
