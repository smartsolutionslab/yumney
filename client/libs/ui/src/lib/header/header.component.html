<header *transloco="let t">
  <div class="header-content">
    <a class="brand" routerLink="/">Yumney</a>
    <nav [attr.aria-label]="t('layout.header.navigation')">
      @if (authService.isAuthenticated()) {
        <a routerLink="/recipes" class="nav-link">
          {{ t('layout.header.myRecipes') }}
        </a>
        <a routerLink="/shopping" class="nav-link">
          {{ t('layout.header.shoppingLists') }}
        </a>
        <div class="user-menu">
          <span class="user-avatar" [attr.aria-label]="authService.displayName()">
            {{ authService.userInitial() }}
          </span>
          <span class="user-name">{{ authService.shortName() }}</span>
          <button class="logout-button" (click)="onLogout()">
            {{ t('layout.header.logout') }}
          </button>
        </div>
      } @else {
        <a routerLink="/auth/login" class="login-link">
          {{ t('layout.header.login') }}
        </a>
      }
      <button
        class="theme-toggle"
        (click)="onToggleTheme()"
        [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        {{ isDark() ? '☀' : '☾' }}
      </button>
      <button
        class="lang-toggle"
        (click)="onSwitchLanguage()"
        [attr.aria-label]="t('layout.header.switchLanguage')"
      >
        {{ t(nextLanguageKey()) }}
      </button>
    </nav>
  </div>
</header>
