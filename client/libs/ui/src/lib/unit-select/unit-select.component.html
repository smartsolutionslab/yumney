<div class="unit-select" ynClickOutside (clickOutside)="onDismiss()" (escape)="onDismiss()" *transloco="let t">
  <button
    type="button"
    class="unit-toggle"
    [class.open]="isOpen()"
    [class.has-value]="selectedValue()"
    [disabled]="isDisabled()"
    (click)="toggle()"
  >
    <span class="unit-label">
      @if (selectedLabel) {
        {{ t(selectedLabel) }}
      } @else {
        <span class="unit-placeholder">{{ placeholder() || t('dashboard.preview.unit') }}</span>
      }
    </span>
    @if (selectedValue()) {
      <span class="unit-clear" (click)="clearSelection($event)" [attr.aria-label]="t('dashboard.preview.clearUnit')"
        ><lucide-icon name="x" [size]="18"
      /></span>
    }
    <span class="unit-chevron" [class.open]="isOpen()"><lucide-icon name="chevron-down" [size]="18" /></span>
  </button>

  @if (isOpen()) {
    <div class="unit-menu" role="listbox">
      @for (group of unitGroups(); track group.key) {
        <div class="unit-group-label">{{ t(group.labelKey) }}</div>
        @for (unit of group.units; track unit.value) {
          <div
            role="option"
            class="unit-menu-item"
            [class.active]="selectedValue() === unit.value"
            [class.focused]="focusedIndex() === flatUnits().indexOf(unit)"
            (click)="selectUnit(unit)"
          >
            {{ t(unit.labelKey) }}
          </div>
        }
      }
    </div>
  }
</div>
