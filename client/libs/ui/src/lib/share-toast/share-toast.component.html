<div class="share-toast" *transloco="let t" role="status" aria-live="polite">
  <div class="share-toast-content">
    <span class="share-toast-icon"><lucide-icon name="share" [size]="20" /></span>
    <div class="share-toast-text">
      <strong>{{ t(titleKey()) }}</strong>
      <span class="share-toast-url">{{ url() }}</span>
    </div>
  </div>
  <button
    class="share-toast-dismiss"
    (click)="dismissed.emit()"
    [attr.aria-label]="t('dashboard.share.dismiss')"
  >
    <lucide-icon name="x" [size]="18" />
  </button>
</div>
