<div class="recipe-edit-container" *transloco="let t">
  <yn-back-link [route]="'/recipes/' + identifier()" label="recipes.edit.back" />

  @if (isLoading()) {
    <yn-loading-spinner label="recipes.edit.loading" />
  }

  @if (serverError(); as error) {
    <yn-message-banner tone="error" [message]="error" />
  }

  @if (recipeData(); as recipe) {
    <yn-recipe-preview
      [recipe]="recipe"
      [isSaving]="isSaving()"
      [previewTitle]="t('recipes.edit.title')"
      (save)="onSave($event)"
      (discard)="onDiscard()"
    />
  }

  @if (showDiscardConfirm()) {
    <yn-confirm-dialog
      [message]="t('recipes.edit.discardConfirm')"
      [confirmLabel]="t('recipes.edit.discardConfirmButton')"
      [cancelLabel]="t('recipes.edit.discardCancelButton')"
      (confirmed)="onDiscardConfirmed()"
      (cancelled)="onDiscardCancelled()"
    />
  }
</div>
