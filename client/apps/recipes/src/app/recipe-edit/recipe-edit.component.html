<div class="recipe-edit-container" *transloco="let t">
  <yn-back-link [route]="'/recipes/' + identifier()" label="recipes.edit.back" />

  @if (isLoading()) {
    <yn-loading-spinner label="recipes.edit.loading" />
  }

  @if (serverError(); as error) {
    <div class="error-banner" role="alert">{{ t(error) }}</div>
  }

  @if (recipeData(); as recipe) {
    <yn-recipe-preview
      [recipe]="recipe"
      [isSaving]="isSaving()"
      [previewTitle]="t('recipes.edit.title')"
      (save)="onSave($event)"
      (discard)="onDiscard()"
    />
  }
</div>
