<div class="resend-container" *transloco="let t">
  <yn-card title="auth.resendVerification.title" subtitle="auth.resendVerification.subtitle">
    @if (isSuccess()) {
      <div class="success-message" role="status" aria-live="polite">
        <h2>{{ t('auth.resendVerification.success.title') }}</h2>
        <p>{{ t('auth.resendVerification.success.message') }}</p>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        @if (serverError(); as error) {
          <yn-message-banner tone="error" [message]="error"/>
        }

        <yn-form-field
          label="auth.resendVerification.email"
          for="email"
          [control]="form.controls.email"
          [errors]="{
            required: 'auth.resendVerification.errors.emailRequired',
            email: 'auth.resendVerification.errors.emailInvalid',
            maxlength: 'auth.resendVerification.errors.emailMaxLength',
          }"
        >
          <input id="email" type="email"formControlName="email" autocomplete="email" [placeholder]="t('auth.resendVerification.emailPlaceholder')"/>
        </yn-form-field>

        <yn-submit-button [loading]="isLoading()" label="auth.resendVerification.submit" loadingLabel="auth.resendVerification.submitting"/>
      </form>
    }

    <p class="back-link">
      <a [routerLink]="ROUTES.auth.register">{{ t('auth.resendVerification.backToRegister') }}</a>
    </p>
  </yn-card>
</div>
