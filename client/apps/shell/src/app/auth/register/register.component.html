<div class="register-container" *transloco="let t">
  <div class="register-card">
    <h1>{{ t('auth.register.title') }}</h1>
    <p class="subtitle">{{ t('auth.register.subtitle') }}</p>

    @if (isSuccess()) {
      <div class="success-message">
        <h2>{{ t('auth.register.success.title') }}</h2>
        <p>{{ t('auth.register.success.message') }}</p>
        <p class="resend-link">
          <a routerLink="/auth/resend-verification">{{ t('auth.register.success.resendLink') }}</a>
        </p>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        @if (serverError(); as error) {
          <div class="error-banner" role="alert">{{ t(error) }}</div>
        }

        <yn-form-field
          label="auth.register.email"
          for="email"
          [control]="form.controls.email"
          [errors]="{
            required: 'auth.register.errors.emailRequired',
            email: 'auth.register.errors.emailInvalid',
            maxlength: 'auth.register.errors.emailMaxLength',
          }"
        >
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            [placeholder]="t('auth.register.emailPlaceholder')"
          />
        </yn-form-field>

        <yn-form-field
          label="auth.register.displayName"
          for="displayName"
          [control]="form.controls.displayName"
          [errors]="{
            required: 'auth.register.errors.displayNameRequired',
            maxlength: 'auth.register.errors.displayNameMaxLength',
          }"
        >
          <input
            id="displayName"
            type="text"
            formControlName="displayName"
            autocomplete="name"
            [placeholder]="t('auth.register.displayNamePlaceholder')"
          />
        </yn-form-field>

        <yn-form-field
          label="auth.register.password"
          for="password"
          [control]="form.controls.password"
          [errors]="{
            required: 'auth.register.errors.passwordRequired',
            minlength: 'auth.register.errors.passwordMinLength',
            pattern: 'auth.register.errors.passwordPattern',
          }"
        >
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="new-password"
          />
        </yn-form-field>

        <yn-form-field
          label="auth.register.confirmPassword"
          for="confirmPassword"
          [control]="form.controls.confirmPassword"
          [errors]="{ required: 'auth.register.errors.confirmPasswordRequired' }"
          [group]="form"
          [groupErrors]="{ passwordsMismatch: 'auth.register.errors.passwordsMismatch' }"
        >
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
          />
        </yn-form-field>

        <yn-submit-button
          [loading]="isLoading()"
          label="auth.register.submit"
          loadingLabel="auth.register.submitting"
        />
      </form>
    }
  </div>
</div>
