    <path d="M148 110 L256 270 L364 110"/>
    <line x1="256" y1="270" x2="256" y2="420"/>
  </g>
  <!-- Steam wisps -->
  <g fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" opacity="0.45">
    <path d="M200 80 Q210 50 200 20"/>
    <path d="M256 70 Q266 38 256 8"/>
    <path d="M312 80 Q322 50 312 20"/>
