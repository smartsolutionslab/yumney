server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm font/woff2;

    # Hashed assets — immutable cache (Angular uses base64-like hashes e.g. chunk-GEF4BW3U.js)
    location ~* [-\.][0-9a-zA-Z]{7,}\.(js|css|woff2|svg|png|jpg|jpeg|webp|avif|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA critical files — must revalidate
    location = /ngsw.json {
        add_header Cache-Control "no-cache";
    }
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # App config — must revalidate (environment-specific)
    location = /assets/config/app-config.json {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
