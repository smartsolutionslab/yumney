name: Dynamic Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [develop]
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC — cleanup stale environments
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        options:
          - create
          - update
          - destroy
      env_name:
        description: Environment name (defaults to branch name)
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  prepare:
    name: Prepare Environment Name
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.sanitize.outputs.env_name }}
      resource_group: ${{ steps.sanitize.outputs.resource_group }}
      keyvault_name: ${{ steps.sanitize.outputs.keyvault_name }}
      action: ${{ steps.resolve.outputs.action }}
    steps:
      - name: Resolve action
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_ACTION="${{ github.event.action }}"
            if [[ "${PR_ACTION}" == "closed" ]]; then
              echo "action=destroy" >> "$GITHUB_OUTPUT"
            elif [[ "${PR_ACTION}" == "opened" || "${PR_ACTION}" == "reopened" ]]; then
              echo "action=create" >> "$GITHUB_OUTPUT"
            else
              echo "action=update" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sanitize environment name
        id: sanitize
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RAW_NAME="pr-${{ github.event.pull_request.number }}"
          elif [[ -n "${{ inputs.env_name }}" ]]; then
            RAW_NAME="${{ inputs.env_name }}"
          else
            RAW_NAME="${GITHUB_REF_NAME}"
          fi

          # Lowercase, replace non-alphanumeric with hyphens, trim hyphens, truncate to 20 chars
          SANITIZED=$(echo "${RAW_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-20)

          if [[ -z "${SANITIZED}" ]]; then
            echo "::error::Environment name resolved to empty string"
            exit 1
          fi

          # Block reserved names
          if [[ "${SANITIZED}" == "staging" || "${SANITIZED}" == "production" ]]; then
            echo "::error::Reserved environment name '${SANITIZED}' cannot be used for dynamic environments"
            exit 1
          fi

          ACTION="${{ steps.resolve.outputs.action }}"
          echo "env_name=${SANITIZED}" >> "$GITHUB_OUTPUT"
          echo "resource_group=rg-yumney-${SANITIZED}" >> "$GITHUB_OUTPUT"
          echo "keyvault_name=kv-yumney-${SANITIZED}" >> "$GITHUB_OUTPUT"

          echo "### Dynamic Environment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Action:** ${ACTION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Name:** ${SANITIZED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Resource Group:** rg-yumney-${SANITIZED}" >> "$GITHUB_STEP_SUMMARY"

  create:
    name: Create Environment
    if: needs.prepare.outputs.action == 'create'
    needs: prepare
    runs-on: ubuntu-latest
    environment: dynamic
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload & CLI
        run: |
          dotnet workload install aspire
          dotnet tool install -g aspire

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          az group create \
            --name "${{ needs.prepare.outputs.resource_group }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --tags environment=dynamic branch="${GITHUB_REF_NAME}" created-by=github-actions "created-at=${CREATED_AT}" \
            --output none
          echo "Resource group created: ${{ needs.prepare.outputs.resource_group }}"

      - name: Generate passwords and create Key Vault
        id: secrets
        run: |
          POSTGRES_PASSWORD=$(openssl rand -base64 32 | tr -d '/+=' | cut -c1-32)
          KEYCLOAK_PASSWORD=$(openssl rand -base64 32 | tr -d '/+=' | cut -c1-32)

          echo "::add-mask::${POSTGRES_PASSWORD}"
          echo "::add-mask::${KEYCLOAK_PASSWORD}"

          # Create Key Vault
          az keyvault create \
            --name "${{ needs.prepare.outputs.keyvault_name }}" \
            --resource-group "${{ needs.prepare.outputs.resource_group }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --enable-rbac-authorization false \
            --output none

          # Store secrets
          az keyvault secret set \
            --vault-name "${{ needs.prepare.outputs.keyvault_name }}" \
            --name "postgres-password" \
            --value "${POSTGRES_PASSWORD}" \
            --output none

          az keyvault secret set \
            --vault-name "${{ needs.prepare.outputs.keyvault_name }}" \
            --name "keycloak-password" \
            --value "${KEYCLOAK_PASSWORD}" \
            --output none

          echo "postgres_password=${POSTGRES_PASSWORD}" >> "$GITHUB_OUTPUT"
          echo "keycloak_password=${KEYCLOAK_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Write frontend config
        run: |
          mkdir -p apps/shell/src/assets/config
          echo '{
            "keycloakUrl": "https://placeholder.keycloak.url",
            "keycloakRealm": "yumney",
            "keycloakClientId": "yumney-web"
          }' > apps/shell/src/assets/config/app-config.json
        working-directory: client

      - name: Build Angular frontend
        run: |
          corepack enable
          yarn install --immutable
          yarn build:all
          node scripts/copy-remotes.mjs
        working-directory: client

      - name: Deploy to Azure
        run: aspire deploy
        working-directory: src/Yumney.AppHost
        env:
          Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ needs.prepare.outputs.resource_group }}
          Parameters__PostgresUser: ${{ vars.POSTGRES_USER }}
          Parameters__PostgresPassword: ${{ steps.secrets.outputs.postgres_password }}
          Parameters__KeycloakPassword: ${{ steps.secrets.outputs.keycloak_password }}

      - name: Get environment URL
        id: env_url
        run: |
          ENV_FQDN=$(az containerapp show \
            --name yumney-gateway \
            --resource-group "${{ needs.prepare.outputs.resource_group }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "pending")
          echo "url=https://${ENV_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Print summary
        run: |
          echo "### Environment Created" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Resource Group:** ${{ needs.prepare.outputs.resource_group }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Key Vault:** ${{ needs.prepare.outputs.keyvault_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** ${{ steps.env_url.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### 🚀 Dynamic environment deployed',
              '',
              `**URL:** ${{ steps.env_url.outputs.url }}`,
              `**Resource Group:** \`${{ needs.prepare.outputs.resource_group }}\``,
              '',
              '_This environment will be automatically destroyed when the PR is closed._',
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '### 🚀 Dynamic environment deployed';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  update:
    name: Update Environment
    if: needs.prepare.outputs.action == 'update'
    needs: prepare
    runs-on: ubuntu-latest
    environment: dynamic
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload & CLI
        run: |
          dotnet workload install aspire
          dotnet tool install -g aspire

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify resource group exists
        run: |
          if ! az group show --name "${{ needs.prepare.outputs.resource_group }}" --output none 2>/dev/null; then
            echo "::error::Resource group '${{ needs.prepare.outputs.resource_group }}' does not exist. Run 'create' first."
            exit 1
          fi

      - name: Retrieve passwords from Key Vault
        id: secrets
        run: |
          POSTGRES_PASSWORD=$(az keyvault secret show \
            --vault-name "${{ needs.prepare.outputs.keyvault_name }}" \
            --name "postgres-password" \
            --query value --output tsv)

          KEYCLOAK_PASSWORD=$(az keyvault secret show \
            --vault-name "${{ needs.prepare.outputs.keyvault_name }}" \
            --name "keycloak-password" \
            --query value --output tsv)

          echo "::add-mask::${POSTGRES_PASSWORD}"
          echo "::add-mask::${KEYCLOAK_PASSWORD}"

          echo "postgres_password=${POSTGRES_PASSWORD}" >> "$GITHUB_OUTPUT"
          echo "keycloak_password=${KEYCLOAK_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Write frontend config
        run: |
          mkdir -p apps/shell/src/assets/config
          echo '{
            "keycloakUrl": "https://placeholder.keycloak.url",
            "keycloakRealm": "yumney",
            "keycloakClientId": "yumney-web"
          }' > apps/shell/src/assets/config/app-config.json
        working-directory: client

      - name: Build Angular frontend
        run: |
          corepack enable
          yarn install --immutable
          yarn build:all
          node scripts/copy-remotes.mjs
        working-directory: client

      - name: Deploy to Azure
        run: aspire deploy
        working-directory: src/Yumney.AppHost
        env:
          Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ needs.prepare.outputs.resource_group }}
          Parameters__PostgresUser: ${{ vars.POSTGRES_USER }}
          Parameters__PostgresPassword: ${{ steps.secrets.outputs.postgres_password }}
          Parameters__KeycloakPassword: ${{ steps.secrets.outputs.keycloak_password }}

      - name: Print summary
        run: |
          echo "### Environment Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Resource Group:** ${{ needs.prepare.outputs.resource_group }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"

  destroy:
    name: Destroy Environment
    if: needs.prepare.outputs.action == 'destroy'
    needs: prepare
    runs-on: ubuntu-latest
    environment: dynamic
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify resource group exists
        id: check
        run: |
          if ! az group show --name "${{ needs.prepare.outputs.resource_group }}" --output none 2>/dev/null; then
            echo "::warning::Resource group '${{ needs.prepare.outputs.resource_group }}' does not exist. Nothing to destroy."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge Key Vault
        if: steps.check.outputs.exists == 'true'
        run: |
          # Delete the Key Vault (moves to soft-deleted state)
          az keyvault delete \
            --name "${{ needs.prepare.outputs.keyvault_name }}" \
            --resource-group "${{ needs.prepare.outputs.resource_group }}" \
            --output none 2>/dev/null || true

          # Purge to release the name (removes from soft-deleted state)
          az keyvault purge \
            --name "${{ needs.prepare.outputs.keyvault_name }}" \
            --output none 2>/dev/null || true

      - name: Delete resource group
        if: steps.check.outputs.exists == 'true'
        run: |
          az group delete \
            --name "${{ needs.prepare.outputs.resource_group }}" \
            --yes \
            --no-wait
          echo "Resource group deletion initiated: ${{ needs.prepare.outputs.resource_group }}"

      - name: Print summary
        run: |
          if [[ "${{ steps.check.outputs.exists }}" == "true" ]]; then
            echo "### Environment Destroyed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Resource Group:** ${{ needs.prepare.outputs.resource_group }} (deletion in progress)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Nothing to Destroy" >> "$GITHUB_STEP_SUMMARY"
            echo "- Resource group ${{ needs.prepare.outputs.resource_group }} did not exist." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### 🗑️ Dynamic environment destroyed\n\nResource group `${{ needs.prepare.outputs.resource_group }}` is being deleted.',
            });

  cleanup:
    name: Cleanup Stale Environments
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    environment: dynamic
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Find and destroy stale environments
        uses: actions/github-script@v7
        env:
          MAX_AGE_HOURS: '72'
        with:
          script: |
            const { execSync } = require('child_process');
            const maxAgeMs = parseInt(process.env.MAX_AGE_HOURS) * 60 * 60 * 1000;
            const now = Date.now();

            // List all dynamic environment resource groups
            const groups = JSON.parse(
              execSync('az group list --tag environment=dynamic --query "[].{name:name, tags:tags}" -o json').toString()
            );

            for (const group of groups) {
              const createdAt = group.tags?.['created-at'] || group.tags?.['created-by'] ? null : null;
              const groupName = group.name;

              // Extract PR number from resource group name (rg-yumney-pr-123)
              const prMatch = groupName.match(/rg-yumney-pr-(\d+)/);
              if (prMatch) {
                const prNumber = parseInt(prMatch[1]);
                try {
                  const { data: pr } = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                  });
                  if (pr.state === 'closed') {
                    core.info(`PR #${prNumber} is closed — destroying ${groupName}`);
                    execSync(`az keyvault delete --name kv-yumney-pr-${prNumber} --resource-group ${groupName} -o none 2>/dev/null || true`);
                    execSync(`az keyvault purge --name kv-yumney-pr-${prNumber} -o none 2>/dev/null || true`);
                    execSync(`az group delete --name ${groupName} --yes --no-wait`);
                    continue;
                  }
                } catch (e) {
                  core.info(`Could not check PR #${prNumber}: ${e.message}`);
                }
              }

              // Fallback: check resource group age via creation timestamp
              try {
                const created = execSync(
                  `az group show --name ${groupName} --query "tags.\\"created-at\\"" -o tsv 2>/dev/null || echo ""`
                ).toString().trim();

                if (created && (now - new Date(created).getTime()) > maxAgeMs) {
                  core.info(`${groupName} is older than ${process.env.MAX_AGE_HOURS}h — destroying`);
                  const kvName = groupName.replace('rg-yumney-', 'kv-yumney-');
                  execSync(`az keyvault delete --name ${kvName} --resource-group ${groupName} -o none 2>/dev/null || true`);
                  execSync(`az keyvault purge --name ${kvName} -o none 2>/dev/null || true`);
                  execSync(`az group delete --name ${groupName} --yes --no-wait`);
                }
              } catch (e) {
                core.warning(`Failed to process ${groupName}: ${e.message}`);
              }
            }

      - name: Print summary
        run: echo "### Stale environment cleanup completed" >> "$GITHUB_STEP_SUMMARY"
