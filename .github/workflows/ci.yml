name: CI

on:
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  backend:
    name: Backend (Build + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore Yumney.slnx

      - name: Check formatting
        run: dotnet format Yumney.slnx --verify-no-changes

      - name: Build
        run: dotnet build Yumney.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Yumney.slnx --no-build --configuration Release --filter "FullyQualifiedName!~SmartSolutionsLab.Yumney.Integration.Tests" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Integration Tests
        run: dotnet test tests/Yumney.Integration.Tests/Yumney.Integration.Tests.csproj --no-build --configuration Release

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./coverage

      - name: Enforce CLAUDE.md coverage thresholds
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'coverage-exempt') }}
        run: python3 scripts/check-coverage-thresholds.py

  frontend:
    name: Frontend (Build + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Yarn
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('client/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify i18n in sync
        run: yarn sync:i18n:check

      - name: Lint
        run: yarn nx run-many -t lint

      - name: Check formatting
        run: yarn prettier --check "**/*.{ts,html,scss,json}"

      - name: Test
        run: yarn nx run-many -t test --coverage

      - name: Build
        run: yarn build:all

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/
          retention-days: 1

  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
