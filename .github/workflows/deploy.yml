name: Deploy

on:
  push:
    branches: [develop]
    tags: ['v*']

concurrency:
  group: deploy-${{ github.ref_type == 'tag' && 'production' || github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/ci.yml

  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      environment: ${{ steps.version.outputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and environment
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IMAGE_TAG="${VERSION}"
            ENVIRONMENT="production"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LATEST_TAG#v}"
            IMAGE_TAG="${VERSION}"
            ENVIRONMENT="production"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            BASE_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
            NEXT_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${{ github.run_number }}"
            IMAGE_TAG="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${{ github.run_number }}"
            ENVIRONMENT="staging"
          else
            BRANCH_SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-30)
            VERSION="0.0.0-${BRANCH_SLUG}.${{ github.run_number }}"
            IMAGE_TAG="${BRANCH_SLUG}-${{ github.run_number }}"
            ENVIRONMENT="staging"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "### Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "### Image Tag: \`${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "### Environment: \`${ENVIRONMENT}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to ${{ needs.version.outputs.environment }}
    needs: [test, version]
    if: vars.AZURE_CLIENT_ID != ''
    runs-on: ubuntu-latest
    environment: ${{ needs.version.outputs.environment }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

      - name: Write environment-specific frontend config
        run: |
          echo '{
            "keycloakUrl": "${{ vars.KEYCLOAK_URL }}",
            "keycloakRealm": "yumney",
            "keycloakClientId": "yumney-web"
          }' > client/dist/apps/shell/browser/assets/config/app-config.json

      - name: Inject gateway URL into Keycloak realm config
        run: |
          sed -i "s|__GATEWAY_URL__|${{ vars.GATEWAY_URL }}|g" src/Yumney.AppHost/Realms/yumney-realm.json

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Diagnose Postgres health
        # Five consecutive deploys (PRs after 2026-05-20) failed at the
        # `provision-postgres` step with Azure InternalServerError after
        # ~5-15 min. The all-or-nothing 500 from Azure swallows the real
        # cause; the most common one is the Flexible Server stuck in a
        # non-terminal state (Updating / Restarting / Stopped) from a
        # prior failed deploy, which Aspire's idempotent PUT can't recover.
        # Show state here and nudge any stuck server back to Ready so the
        # subsequent `aspire deploy` succeeds.
        #
        # Also runs two safe staging-only recovery actions before the deploy
        # (see "Auto-recovery" block below). Anything destructive (drop &
        # recreate a DB, delete the whole server) stays manual.
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT: ${{ needs.version.outputs.environment }}
        run: |
          set -e
          echo "─── Postgres servers in $RG ───"
          az postgres flexible-server list -g "$RG" -o table || true

          servers=$(az postgres flexible-server list -g "$RG" --query "[].name" -o tsv)
          if [ -z "$servers" ]; then
            echo "No Postgres flexible servers found yet — first-time provisioning, skipping precheck."
            exit 0
          fi

          for srv in $servers; do
            state=$(az postgres flexible-server show -g "$RG" -n "$srv" --query "state" -o tsv)
            echo "  $srv → state=$state"

            echo "─── Last 10 RG-level deployment operations (Postgres-relevant) ───"
            az deployment group list -g "$RG" --query "[?contains(name,'postgres')||contains(name,'PostgreSQL')]|[0:10].{name:name,state:properties.provisioningState,ts:properties.timestamp}" -o table || true

            echo "─── Last 5 failed deployments in the RG ───"
            az deployment group list -g "$RG" --query "[?properties.provisioningState=='Failed']|[0:5].{name:name,state:properties.provisioningState,ts:properties.timestamp,err:properties.error.message}" -o table || true

            # For the most recent failed deployment touching postgres, dump its
            # operation-level error — that's where Azure surfaces the actual
            # cause behind the InternalServerError.
            last_failed=$(az deployment group list -g "$RG" --query "[?properties.provisioningState=='Failed']|[?contains(name,'postgres')||contains(name,'PostgreSQL')]|[0].name" -o tsv 2>/dev/null || true)
            if [ -n "$last_failed" ]; then
              echo "─── Operation-level error for failed deployment '$last_failed' ───"
              az deployment operation group list -g "$RG" --name "$last_failed" --query "[?properties.provisioningState=='Failed'].{target:properties.targetResource.resourceType,name:properties.targetResource.resourceName,code:properties.statusMessage.error.code,msg:properties.statusMessage.error.message}" -o json || true
            fi

            if [ "$state" != "Ready" ] && [ "$state" != "Disabled" ]; then
              echo "  ⚠ $srv is $state (not Ready) — attempting restart"
              az postgres flexible-server restart -g "$RG" -n "$srv" --no-wait || true

              deadline=$(( $(date +%s) + 900 ))
              while [ "$(date +%s)" -lt "$deadline" ]; do
                state=$(az postgres flexible-server show -g "$RG" -n "$srv" --query "state" -o tsv)
                echo "    polling $srv state=$state"
                if [ "$state" = "Ready" ]; then break; fi
                sleep 20
              done
              if [ "$state" != "Ready" ]; then
                echo "  ✗ $srv still $state after 15 min — failing precheck so the deploy doesn't waste 15 more min hitting Azure 500s"
                az monitor activity-log list -g "$RG" --max-events 5 -o table || true
                exit 1
              fi
              echo "  ✓ $srv back to Ready"
            fi
          done

          # ─── Auto-recovery (staging only) ───
          # Two best-effort actions to clear the failure mode we saw on
          # 2026-05-21..05-22: Postgres RP intermittently 500s on database
          # ARM PUTs while the server itself is Ready. Both actions are
          # additive — no drops, no server deletion. Production never
          # auto-recovers; the operator handles it manually with the
          # diagnostic output above.
          if [ "$ENVIRONMENT" != "staging" ]; then
            echo "─── Skipping auto-recovery: environment is '$ENVIRONMENT' (only runs on staging) ───"
            exit 0
          fi

          # Authoritative list comes from the AppHost — grep AddDatabase()
          # calls in Program.cs so this stays in sync when modules are added
          # or renamed. Two duplicate blocks (run + publish mode) collapse
          # via sort -u.
          expected_dbs=$(grep -oE 'AddDatabase\("[a-z]+"\)' src/Yumney.AppHost/Program.cs | grep -oE '"[a-z]+"' | tr -d '"' | sort -u)
          if [ -z "$expected_dbs" ]; then
            echo "─── Auto-recovery: could not parse expected DB list from Program.cs — skipping DB backfill ───"
          else
            for srv in $servers; do
              echo "─── Auto-recovery: ensuring expected DBs exist on $srv ───"
              existing=$(az postgres flexible-server db list -g "$RG" -s "$srv" --query "[].name" -o tsv 2>/dev/null || echo "")
              for db in $expected_dbs; do
                if echo "$existing" | grep -qx "$db"; then
                  echo "  ✓ $db exists"
                else
                  echo "  ⚠ $db missing — attempting direct CLI create (often succeeds when ARM PUT 500s)"
                  if az postgres flexible-server db create -g "$RG" -s "$srv" -d "$db" --charset UTF8 --collation en_US.utf8; then
                    echo "  ✓ $db created"
                  else
                    echo "  ✗ $db create failed — RP may still be stuck; aspire deploy will retry"
                  fi
                fi
              done
            done
          fi

          # Stale failed postgres-* deployment records accumulate in the RG
          # and Azure occasionally lets sibling deployments inherit their
          # poisoned state. Sweep them so the next aspire deploy starts from
          # a clean history.
          echo "─── Auto-recovery: clearing stale failed postgres ARM deployments ───"
          stale=$(az deployment group list -g "$RG" --query "[?properties.provisioningState=='Failed' && (contains(name,'postgres') || contains(name,'PostgreSQL'))].name" -o tsv)
          if [ -z "$stale" ]; then
            echo "  (none)"
          else
            for d in $stale; do
              echo "  deleting $d"
              az deployment group delete -g "$RG" --name "$d" --no-wait || true
            done
          fi

      - name: Deploy to Azure
        working-directory: src/Yumney.AppHost
        run: aspire deploy
        env:
          ASPNETCORE_ENVIRONMENT: ${{ needs.version.outputs.environment == 'production' && 'Production' || 'Staging' }}
          Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          Parameters__PostgresUser: ${{ vars.POSTGRES_USER }}
          Parameters__PostgresPassword: ${{ secrets.POSTGRES_PASSWORD }}
          Parameters__KeycloakPassword: ${{ secrets.KEYCLOAK_PASSWORD }}
          Parameters__YumneyApiClientSecret: ${{ secrets.YUMNEY_API_CLIENT_SECRET }}
          Parameters__OpenAiApiKey: ${{ secrets.OPENAI_API_KEY }}
          Parameters__MessagingPassword: ${{ secrets.MESSAGING_PASSWORD }}
          Parameters__RedisPassword: ${{ secrets.REDIS_PASSWORD }}
          Parameters__KeycloakDbHost: ${{ vars.POSTGRES_HOST }}
