name: Deploy

on:
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Azure
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload & CLI
        run: |
          dotnet workload install aspire
          dotnet tool install -g aspire

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write environment-specific frontend config
        run: |
          mkdir -p apps/shell/src/assets/config
          echo '{
            "keycloakUrl": "${{ vars.KEYCLOAK_URL }}",
            "keycloakRealm": "yumney",
            "keycloakClientId": "yumney-web"
          }' > apps/shell/src/assets/config/app-config.json
        working-directory: client

      - name: Build Angular frontend
        run: |
          corepack enable
          yarn install --immutable
          yarn build:all
          node scripts/copy-remotes.mjs
        working-directory: client

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        run: aspire deploy
        working-directory: src/Yumney.AppHost
        env:
          Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          Parameters__PostgresUser: ${{ vars.POSTGRES_USER }}
          Parameters__PostgresPassword: ${{ secrets.POSTGRES_PASSWORD }}
          Parameters__KeycloakPassword: ${{ secrets.KEYCLOAK_PASSWORD }}
