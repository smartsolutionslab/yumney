name: Deploy

on:
  push:
    branches: [develop]
    tags: ['v*']

concurrency:
  group: deploy-${{ github.ref_type == 'tag' && 'production' || github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/ci.yml

  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      environment: ${{ steps.version.outputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and environment
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IMAGE_TAG="${VERSION}"
            ENVIRONMENT="production"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LATEST_TAG#v}"
            IMAGE_TAG="${VERSION}"
            ENVIRONMENT="production"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            BASE_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
            NEXT_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${{ github.run_number }}"
            IMAGE_TAG="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${{ github.run_number }}"
            ENVIRONMENT="staging"
          else
            BRANCH_SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-30)
            VERSION="0.0.0-${BRANCH_SLUG}.${{ github.run_number }}"
            IMAGE_TAG="${BRANCH_SLUG}-${{ github.run_number }}"
            ENVIRONMENT="staging"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "### Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "### Image Tag: \`${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "### Environment: \`${ENVIRONMENT}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to ${{ needs.version.outputs.environment }}
    needs: [test, version]
    if: vars.AZURE_CLIENT_ID != ''
    runs-on: ubuntu-latest
    environment: ${{ needs.version.outputs.environment }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

      - name: Write environment-specific frontend config
        run: |
          echo '{
            "keycloakUrl": "${{ vars.KEYCLOAK_URL }}",
            "keycloakRealm": "yumney",
            "keycloakClientId": "yumney-web"
          }' > client/dist/apps/shell/browser/assets/config/app-config.json

      - name: Inject gateway URL into Keycloak realm config
        run: |
          sed -i "s|__GATEWAY_URL__|${{ vars.GATEWAY_URL }}|g" src/Yumney.AppHost/Realms/yumney-realm.json

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Diagnose Postgres health
        # Five consecutive deploys (PRs after 2026-05-20) failed at the
        # `provision-postgres` step with Azure InternalServerError after
        # ~5-15 min. The all-or-nothing 500 from Azure swallows the real
        # cause; the most common one is the Flexible Server stuck in a
        # non-terminal state (Updating / Restarting / Stopped) from a
        # prior failed deploy, which Aspire's idempotent PUT can't recover.
        # Show state here and nudge any stuck server back to Ready so the
        # subsequent `aspire deploy` succeeds.
        #
        # Also runs two safe staging-only recovery actions before the deploy
        # (see "Auto-recovery" block below). Anything destructive (drop &
        # recreate a DB, delete the whole server) stays manual.
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT: ${{ needs.version.outputs.environment }}
        run: |
          set -e
          # First-time provisioning (or after a manual RG wipe) leaves the
          # RG itself missing. `az postgres flexible-server list -g <rg>`
          # then errors with ResourceGroupNotFound instead of returning an
          # empty list, which under `set -e` kills the step before the
          # "no servers yet" branch can fire. Bail out early in that case
          # so `aspire deploy` can create the RG fresh.
          if [ "$(az group exists -n "$RG")" = "false" ]; then
            echo "Resource group $RG does not exist — first-time provisioning, skipping precheck."
            exit 0
          fi
          echo "─── Postgres servers in $RG ───"
          az postgres flexible-server list -g "$RG" -o table || true

          servers=$(az postgres flexible-server list -g "$RG" --query "[].name" -o tsv)
          if [ -z "$servers" ]; then
            echo "No Postgres flexible servers found yet — first-time provisioning, skipping precheck."
            exit 0
          fi

          for srv in $servers; do
            state=$(az postgres flexible-server show -g "$RG" -n "$srv" --query "state" -o tsv)
            echo "  $srv → state=$state"

            echo "─── Last 10 RG-level deployment operations (Postgres-relevant) ───"
            az deployment group list -g "$RG" --query "[?contains(name,'postgres')||contains(name,'PostgreSQL')]|[0:10].{name:name,state:properties.provisioningState,ts:properties.timestamp}" -o table || true

            echo "─── Last 5 failed deployments in the RG ───"
            az deployment group list -g "$RG" --query "[?properties.provisioningState=='Failed']|[0:5].{name:name,state:properties.provisioningState,ts:properties.timestamp,err:properties.error.message}" -o table || true

            # For the most recent failed deployment touching postgres, dump its
            # operation-level error — that's where Azure surfaces the actual
            # cause behind the InternalServerError.
            last_failed=$(az deployment group list -g "$RG" --query "[?properties.provisioningState=='Failed']|[?contains(name,'postgres')||contains(name,'PostgreSQL')]|[0].name" -o tsv 2>/dev/null || true)
            if [ -n "$last_failed" ]; then
              echo "─── Operation-level error for failed deployment '$last_failed' ───"
              az deployment operation group list -g "$RG" --name "$last_failed" --query "[?properties.provisioningState=='Failed'].{target:properties.targetResource.resourceType,name:properties.targetResource.resourceName,code:properties.statusMessage.error.code,msg:properties.statusMessage.error.message}" -o json || true
            fi

            if [ "$state" != "Ready" ] && [ "$state" != "Disabled" ]; then
              echo "  ⚠ $srv is $state (not Ready) — attempting restart"
              az postgres flexible-server restart -g "$RG" -n "$srv" --no-wait || true

              deadline=$(( $(date +%s) + 900 ))
              while [ "$(date +%s)" -lt "$deadline" ]; do
                state=$(az postgres flexible-server show -g "$RG" -n "$srv" --query "state" -o tsv)
                echo "    polling $srv state=$state"
                if [ "$state" = "Ready" ]; then break; fi
                sleep 20
              done
              if [ "$state" != "Ready" ]; then
                echo "  ✗ $srv still $state after 15 min — failing precheck so the deploy doesn't waste 15 more min hitting Azure 500s"
                az monitor activity-log list -g "$RG" --max-events 5 -o table || true
                exit 1
              fi
              echo "  ✓ $srv back to Ready"
            fi
          done

          # ─── Auto-recovery (staging only) ───
          # Two best-effort actions to clear the failure mode we saw on
          # 2026-05-21..05-22: Postgres RP intermittently 500s on database
          # ARM PUTs while the server itself is Ready. Both actions are
          # additive — no drops, no server deletion. Production never
          # auto-recovers; the operator handles it manually with the
          # diagnostic output above.
          if [ "$ENVIRONMENT" != "staging" ]; then
            echo "─── Skipping auto-recovery: environment is '$ENVIRONMENT' (only runs on staging) ───"
            exit 0
          fi

          # Authoritative list comes from the AppHost — grep AddDatabase()
          # calls in Program.cs so this stays in sync when modules are added
          # or renamed. Two duplicate blocks (run + publish mode) collapse
          # via sort -u.
          expected_dbs=$(grep -oE 'AddDatabase\("[a-z]+"\)' src/Yumney.AppHost/Program.cs | grep -oE '"[a-z]+"' | tr -d '"' | sort -u)
          if [ -z "$expected_dbs" ]; then
            echo "─── Auto-recovery: could not parse expected DB list from Program.cs — skipping DB backfill ───"
          else
            # rp_stuck: latches once a create returns InternalServerError /
            # GatewayTimeout. Each failing create burns ~4 min waiting for
            # Azure's gateway to give up; after the first one we know the RP
            # for this server is unhealthy and the remaining creates would
            # waste the same 4 min each (and risk exhausting the Azure CLI
            # auth session before aspire deploy). Skip them and let the
            # operator escalate to the manual server-delete path.
            rp_stuck=0
            for srv in $servers; do
              echo "─── Auto-recovery: ensuring expected DBs exist on $srv ───"
              existing=$(az postgres flexible-server db list -g "$RG" -s "$srv" --query "[].name" -o tsv 2>/dev/null || echo "")
              for db in $expected_dbs; do
                if echo "$existing" | grep -qx "$db"; then
                  echo "  ✓ $db exists"
                elif [ "$rp_stuck" = "1" ]; then
                  echo "  ⤼ $db missing — skipping create (RP already returned 500/timeout this run)"
                else
                  echo "  ⚠ $db missing — attempting direct CLI create (often succeeds when ARM PUT 500s)"
                  if az postgres flexible-server db create -g "$RG" -s "$srv" -d "$db" --charset UTF8 --collation en_US.utf8; then
                    echo "  ✓ $db created"
                  else
                    echo "  ✗ $db create failed — RP appears stuck; skipping remaining creates to preserve Azure CLI session"
                    rp_stuck=1
                  fi
                fi
              done
            done
          fi

          # Stale failed postgres-* deployment records accumulate in the RG
          # and Azure occasionally lets sibling deployments inherit their
          # poisoned state. Sweep them so the next aspire deploy starts from
          # a clean history.
          echo "─── Auto-recovery: clearing stale failed postgres ARM deployments ───"
          stale=$(az deployment group list -g "$RG" --query "[?properties.provisioningState=='Failed' && (contains(name,'postgres') || contains(name,'PostgreSQL'))].name" -o tsv)
          if [ -z "$stale" ]; then
            echo "  (none)"
          else
            for d in $stale; do
              echo "  deleting $d"
              az deployment group delete -g "$RG" --name "$d" --no-wait || true
            done
          fi

      - name: Refresh Azure login
        # The precheck can spend several minutes on slow `az` calls (e.g.
        # ~4 min per stuck Postgres RP `db create`). That sometimes lets
        # Aspire's `validate-azure-login` step fail with "Azure CLI
        # authentication failed due to an unknown error" before the
        # deploy starts. Re-running the OIDC login here is cheap
        # insurance — fresh access token, regardless of what the
        # precheck did.
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        working-directory: src/Yumney.AppHost
        run: aspire deploy
        env:
          ASPNETCORE_ENVIRONMENT: ${{ needs.version.outputs.environment == 'production' && 'Production' || 'Staging' }}
          Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          Parameters__PostgresUser: ${{ vars.POSTGRES_USER }}
          Parameters__PostgresPassword: ${{ secrets.POSTGRES_PASSWORD }}
          Parameters__KeycloakPassword: ${{ secrets.KEYCLOAK_PASSWORD }}
          Parameters__YumneyApiClientSecret: ${{ secrets.YUMNEY_API_CLIENT_SECRET }}
          Parameters__OpenAiApiKey: ${{ secrets.OPENAI_API_KEY }}
          Parameters__MessagingPassword: ${{ secrets.MESSAGING_PASSWORD }}
          Parameters__RedisPassword: ${{ secrets.REDIS_PASSWORD }}
          Parameters__KeycloakDbHost: ${{ vars.POSTGRES_HOST }}

      - name: Seed Keycloak realm to file share
        # Aspire's `WithRealmImport("Realms")` provisions the Azure File
        # volume mount at /opt/keycloak/data/import but does NOT upload
        # the local realm JSON into the share. On a from-scratch deploy
        # (RG wiped), Keycloak boots with an empty import dir and never
        # sees the yumney realm — only `master` gets initialized.
        # Upload the (already gateway-URL-injected) realm here, then
        # restart Keycloak so `--import-realm` runs against it.
        #
        # Idempotent on subsequent deploys: Keycloak's import strategy is
        # IGNORE_EXISTING, so re-uploading the same realm (or an updated
        # one) won't overwrite an existing realm. Realm-schema changes
        # still need to go through the Keycloak admin API or a manual
        # realm-delete + redeploy.
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          sa=$(az storage account list -g "$RG" --query "[?starts_with(name,'caestoragevolume')] | [0].name" -o tsv)
          if [ -z "$sa" ]; then
            echo "::warning::no caestoragevolume* storage account found in $RG — skipping realm upload"
            exit 0
          fi
          key=$(az storage account keys list -g "$RG" -n "$sa" --query "[0].value" -o tsv)
          share=$(az storage share list --account-name "$sa" --account-key "$key" --query "[?contains(name,'keycloak')] | [0].name" -o tsv)
          if [ -z "$share" ]; then
            echo "::warning::no keycloak file share found on $sa — skipping realm upload"
            exit 0
          fi
          echo "Uploading realm to share=$share (account=$sa)"
          az storage file upload \
            --share-name "$share" \
            --account-name "$sa" \
            --account-key "$key" \
            --source src/Yumney.AppHost/Realms/yumney-realm.json \
            --path yumney-realm.json

          echo "Restarting Keycloak so --import-realm picks up the file"
          rev=$(az containerapp show -g "$RG" -n keycloak --query "properties.latestRevisionName" -o tsv)
          az containerapp revision restart -g "$RG" -n keycloak --revision "$rev"

      - name: Run EF migrations
        # yumney-migrations is published as a Container Apps Job (manual
        # trigger). aspire deploy creates/updates the Job resource but does
        # NOT execute it — we have to call `az containerapp job start` and
        # wait for completion. Without this step, deploys would silently
        # ship code that expects migrations not yet applied (observed on
        # 2026-05-22 when shoppingdb and mealplandb sat with no schema).
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          echo "─── Starting yumney-migrations job ───"
          execution=$(az containerapp job start -g "$RG" -n yumney-migrations --query "name" -o tsv)
          echo "  execution: $execution"

          # Poll up to 10 min — Aspire's default replica timeout is 30 min but
          # migrations across 4 module DBs realistically finish in <2 min.
          # Note the odd CLI shape: `--name` is the JOB, `--job-execution-name`
          # is the execution. The execution name comes back from `job start`.
          for i in $(seq 1 60); do
            status=$(az containerapp job execution show -g "$RG" --name yumney-migrations --job-execution-name "$execution" --query "properties.status" -o tsv 2>/dev/null || echo "Unknown")
            echo "  [${i}] status=$status"
            case "$status" in
              Succeeded) echo "✓ migrations applied (or no pending)"; exit 0 ;;
              Failed|Degraded|Stopped|Stopping) echo "::error::migration job ended with status=$status"; exit 1 ;;
              Running|Processing|Pending|"") sleep 10 ;;
              *) sleep 10 ;;
            esac
          done
          echo "::error::timed out waiting for migration job to finish"
          exit 1

      - name: Verify Postgres state
        # Observed twice on 2026-05-22: `aspire deploy` reports success
        # but leaves two specific module DBs (mealplandb, shoppingdb)
        # missing on the Flex server. The next deploy's precheck silently
        # re-creates them, so the regression hides between runs.
        #
        # This step fails the deploy loudly if any expected DB is absent
        # after aspire deploy. The precheck has already created them on a
        # healthy RP, so a failure here means aspire's own provisioning
        # dropped/skipped them on this run — that's the signal to dig in.
        # Same grep as the precheck keeps the expected list in sync with
        # the AppHost.
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          expected_dbs=$(grep -oE 'AddDatabase\("[a-z]+"\)' src/Yumney.AppHost/Program.cs | grep -oE '"[a-z]+"' | tr -d '"' | sort -u)
          if [ -z "$expected_dbs" ]; then
            echo "Could not parse expected DB list from Program.cs — skipping verification"
            exit 0
          fi

          servers=$(az postgres flexible-server list -g "$RG" --query "[].name" -o tsv)
          if [ -z "$servers" ]; then
            echo "No Postgres flexible servers in $RG — nothing to verify"
            exit 0
          fi

          missing=0
          for srv in $servers; do
            echo "─── Verifying expected DBs on $srv ───"
            existing=$(az postgres flexible-server db list -g "$RG" -s "$srv" --query "[].name" -o tsv 2>/dev/null || echo "")
            for db in $expected_dbs; do
              if echo "$existing" | grep -qx "$db"; then
                echo "  ✓ $db"
              else
                echo "  ✗ $db MISSING after aspire deploy"
                missing=$((missing + 1))
              fi
            done
          done

          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing expected database(s) missing after aspire deploy — recurring Aspire+Postgres-Flex regression; investigate before merging more changes"
            exit 1
          fi
          echo "✓ All expected DBs present after aspire deploy"
