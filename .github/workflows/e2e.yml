name: E2E Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Yarn
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache-dir
        working-directory: client
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('client/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: client
        run: yarn install --immutable

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Restore .NET packages
        run: dotnet restore Yumney.slnx

      - name: Build solution (including AppHost)
        run: dotnet build Yumney.slnx --no-restore

      - name: Start Aspire AppHost
        run: |
          aspire start --apphost src/Yumney.AppHost/Yumney.AppHost.csproj 2>&1 | tee /tmp/aspire.log

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Gateway..."
          aspire wait yumney-gateway --timeout 600 2>&1 || true
          echo "Waiting for Frontend shell..."
          aspire wait shell --timeout 300 2>&1 || true
          aspire describe 2>&1

      - name: Run backend integration tests
        continue-on-error: true
        run: dotnet test tests/Yumney.Integration.Tests/Yumney.Integration.Tests.csproj

      - name: Run Playwright e2e tests
        continue-on-error: true
        working-directory: client
        run: npx nx e2e shell-e2e --skip-nx-cache
        env:
          BASE_URL: http://localhost:4200
          E2E_USER: testuser
          E2E_PASSWORD: Test1234
          CI: true

      - name: Stop Aspire
        if: always()
        run: |
          aspire stop 2>/dev/null || true
          pkill -f "Yumney.AppHost" 2>/dev/null || true
          pkill -f "aspire" 2>/dev/null || true
          docker stop $(docker ps -q) 2>/dev/null || true

      - name: Upload Aspire logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aspire-logs
          path: /tmp/aspire.log
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/test-results/
            client/apps/shell-e2e/playwright-report/
          retention-days: 14
