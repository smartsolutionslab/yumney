name: E2E Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Yarn
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache-dir
        working-directory: client
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('client/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: client
        run: yarn install --immutable

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Restore and build backend
        run: |
          dotnet restore Yumney.slnx
          dotnet build Yumney.slnx --no-restore

      - name: Build frontend
        working-directory: client
        run: yarn build:all

      - name: Start Aspire AppHost (headless — no JS dev servers)
        run: |
          # HeadlessMode skips JS dev servers, Gateway, PgAdmin, Mailpit, Ollama
          # SkipMigrations lets tests use EnsureCreated instead of MigrationRunner
          aspire run \
            --project src/Yumney.AppHost/Yumney.AppHost.csproj \
            --no-build \
            --detach \
            --non-interactive \
            --log-level Information \
            -- --HeadlessMode=true --SkipMigrations=true \
            > /tmp/aspire.log 2>&1 || true
          echo "Aspire detach completed"
          cat /tmp/aspire.log

      - name: Serve pre-built frontend
        run: |
          # Serve the shell dist on port 4200 (same port Aspire would use for dev servers)
          npx serve client/dist/apps/shell/browser -l 4200 --no-clipboard --single &
          echo "Static frontend server started on port 4200"

      - name: Wait for services to be ready
        run: |
          # In headless mode, no Gateway — wait for Keycloak (slowest infra) and an API
          echo "Waiting for Keycloak (port 8080)..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/realms/yumney > /dev/null 2>&1; then
              echo "Keycloak is ready after $((i * 5))s!"
              break
            fi
            if [ $((i % 6)) -eq 0 ]; then
              echo "--- Still waiting at $((i * 5))s ---"
            fi
            if [ $i -eq 120 ]; then
              echo "::warning::Keycloak did not become ready within 10 minutes"
              cat /tmp/aspire.log 2>/dev/null || true
            fi
            sleep 5
          done

          echo "Waiting for Frontend (port 4200)..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            sleep 5
          done

      - name: Run backend integration tests
        continue-on-error: true
        run: dotnet test tests/Yumney.Integration.Tests/Yumney.Integration.Tests.csproj --no-build

      - name: Run Playwright e2e tests
        continue-on-error: true
        working-directory: client
        run: npx nx e2e shell-e2e --skip-nx-cache
        env:
          BASE_URL: http://localhost:4200
          E2E_USER: testuser
          E2E_PASSWORD: Test1234
          CI: true

      - name: Stop services
        if: always()
        run: |
          aspire stop 2>/dev/null || true
          pkill -f "serve.*4200" 2>/dev/null || true
          pkill -f "Yumney" 2>/dev/null || true
          docker stop $(docker ps -q) 2>/dev/null || true

      - name: Upload Aspire logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aspire-logs
          path: /tmp/aspire.log
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/test-results/
            client/apps/shell-e2e/playwright-report/
          retention-days: 14
