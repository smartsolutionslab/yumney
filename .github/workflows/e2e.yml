name: E2E Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Opt the AppHost into E2E mode — skips persistent volumes, pgAdmin,
      # mailpit, and the LLM provider setup, so fewer containers need to come up.
      E2ETests: 'true'
      # Aspire parameters. Aspire reads Parameters__<Name> as the param value
      # (the "__" is the configuration section separator). Values are local to
      # this ephemeral runner — no production secrets involved.
      Parameters__PostgresUser: yumney
      Parameters__PostgresPassword: yumney-e2e
      Parameters__KeycloakPassword: keycloak-e2e
      Parameters__MessagingPassword: messaging-e2e
      Parameters__RedisPassword: redis-e2e

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Yarn
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache-dir
        working-directory: client
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('client/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: client
        run: yarn install --immutable

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: client
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install chromium --with-deps
          fi

      - name: Restore .NET packages
        run: dotnet restore Yumney.slnx

      - name: Build solution (including AppHost)
        run: dotnet build Yumney.slnx --no-restore

      - name: Build frontend bundle for E2E
        # Pre-build all MFEs and merge them into dist/apps/shell/browser so
        # the AppHost can serve a single static bundle in E2E mode (see
        # serve:shell:dist). Production-mode build also enables Angular's
        # provideServiceWorker — required by the PWA tests.
        working-directory: client
        run: yarn build:all

      - name: Start Aspire AppHost
        run: |
          aspire start --apphost src/Yumney.AppHost/Yumney.AppHost.csproj 2>&1 | tee /tmp/aspire.log

      - name: Wait for services to be ready (instrumented)
        run: |
          set +e
          mkdir -p /tmp/diag
          START_TS=$(date +%s)
          stamp() { echo "[+$(($(date +%s) - START_TS))s] $*"; }

          stamp "=== initial aspire describe ==="
          aspire describe 2>&1 | tee /tmp/diag/aspire-describe-initial.log

          stamp "=== docker ps (initial) ==="
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>&1 | tee /tmp/diag/docker-ps-initial.log

          poll() {
            local name="$1" url="$2" timeout="$3"
            local deadline=$(( $(date +%s) + timeout ))
            local t0=$(date +%s)
            stamp "poll-start $name $url (timeout ${timeout}s)"
            while [ "$(date +%s)" -lt "$deadline" ]; do
              local code
              code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 3 "$url" 2>/dev/null || echo 000)
              # Treat the status as 3-digit; use base-10 arithmetic to avoid
              # bash's leading-zero-octal interpretation. 000 = not ready.
              if [ "${#code}" -eq 3 ] && [ "$((10#$code))" -ge 200 ] && [ "$((10#$code))" -lt 500 ]; then
                stamp "poll-ready $name after $(( $(date +%s) - t0 ))s (http $code)"
                return 0
              fi
              sleep 2
            done
            stamp "poll-TIMEOUT $name after ${timeout}s"
            return 1
          }

          # Probe the real endpoints in the background so they run in parallel.
          poll gateway  http://localhost:5100/                 540 > /tmp/diag/poll-gateway.log 2>&1 &
          poll shell    http://localhost:4200/                 540 > /tmp/diag/poll-shell.log 2>&1 &
          poll keycloak http://localhost:8080/realms/master    540 > /tmp/diag/poll-keycloak.log 2>&1 &
          wait

          for f in /tmp/diag/poll-*.log; do
            echo "--- $f ---"
            cat "$f"
          done

          stamp "=== aspire describe (after polling) ==="
          aspire describe 2>&1 | tee /tmp/diag/aspire-describe-final.log

          stamp "=== docker ps (final) ==="
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>&1 | tee /tmp/diag/docker-ps-final.log

          stamp "=== docker logs (last 200 lines per container) ==="
          for c in $(docker ps -q); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's#^/##')
            docker logs --tail 200 "$c" > "/tmp/diag/docker-${name}.log" 2>&1 || true
          done

          stamp "=== Aspire CLI + resource logs copy ==="
          if [ -d "$HOME/.aspire/logs" ]; then
            cp -r "$HOME/.aspire/logs" /tmp/diag/aspire-cli-logs || true
          fi

          # Keep legacy aspire wait calls too for comparison, short timeout
          stamp "=== legacy aspire wait (short timeout for comparison) ==="
          aspire wait yumney-gateway --timeout 30 2>&1 || true
          aspire wait shell --timeout 30 2>&1 || true

          stamp "diagnostic step complete"

      - name: Fetch Keycloak token for E2E (direct container port)
        # Bypass Aspire's DCP localhost proxy — every in-process HTTP client
        # we've tried has failed against it. Docker maps Keycloak's 8080 to
        # a random host port (shown in docker ps); hit that directly.
        # curl from this workflow step reliably reaches the container.
        run: |
          set -e
          kc=$(docker ps -q -f name=keycloak | head -1)
          test -n "$kc" || { echo "keycloak container not found"; exit 1; }
          kc_port=$(docker port "$kc" 8080/tcp | head -1 | sed -E 's/.*:([0-9]+)$/\1/')
          test -n "$kc_port" || { echo "could not resolve keycloak host port"; exit 1; }
          echo "keycloak mapped to host port $kc_port"

          # Warm-up: first Keycloak request after startup takes 60-70s (JIT +
          # realm metadata). Hit /realms/master first so the token endpoint
          # afterwards is fast.
          curl -sS --max-time 180 -o /dev/null \
            "http://127.0.0.1:${kc_port}/realms/master" || true

          for i in 1 2 3; do
            echo "token attempt $i..."
            response=$(curl -sS --max-time 180 \
              -X POST "http://127.0.0.1:${kc_port}/realms/yumney/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=password" \
              -d "client_id=yumney-web" \
              -d "username=testuser" \
              -d "password=Test1234" \
              -d "scope=openid profile email roles" \
              -w "\n__HTTP_CODE__%{http_code}") || true
            http_code=$(echo "$response" | sed -n 's/^__HTTP_CODE__//p')
            body=$(echo "$response" | sed '/^__HTTP_CODE__/d')
            if [ "$http_code" = "200" ]; then
              echo "$body" > /tmp/e2e-tokens.json
              echo "token fetch succeeded on attempt $i"
              break
            fi
            echo "http=$http_code, body preview: $(echo "$body" | head -c 200)"
            sleep 5
          done
          test -s /tmp/e2e-tokens.json

      - name: Warm up API endpoints
        # First call to each *.Api after Aspire startup pays a 5-15s JIT +
        # EF-model-build cost. Playwright toBeVisible timeouts are 10s, so
        # the first profile-settings test would fire before the response
        # lands. Prewarm each API via the gateway with the test token.
        run: |
          set +e
          token=$(python3 -c 'import json; print(json.load(open("/tmp/e2e-tokens.json"))["access_token"])')
          for endpoint in \
            "http://localhost:5100/api/v1/users/me/profile" \
            "http://localhost:5100/api/v1/recipes?page=1&pageSize=1" \
            "http://localhost:5100/api/v1/shopping-lists?page=1&pageSize=1" \
            "http://localhost:5100/api/v1/meal-plans/current"; do
            echo "warmup: $endpoint"
            time curl -sk -o /dev/null -w "  status=%{http_code} time=%{time_total}s\n" \
              --max-time 60 \
              -H "Authorization: Bearer $token" \
              "$endpoint"
          done

      # Backend integration tests are exercised by the dedicated CI workflow
      # (Backend Build + Test). Skipping here to keep the E2E run focused on
      # browser-level coverage and reduce wall time.

      - name: Run Playwright e2e tests
        continue-on-error: true
        working-directory: client
        run: npx nx e2e shell-e2e
        env:
          BASE_URL: http://localhost:4200
          GATEWAY_URL: http://localhost:5100
          E2E_TOKENS_FILE: /tmp/e2e-tokens.json
          CI: true

      - name: Stop Aspire
        if: always()
        run: |
          aspire stop 2>/dev/null || true
          pkill -f "Yumney.AppHost" 2>/dev/null || true
          pkill -f "aspire" 2>/dev/null || true
          docker stop $(docker ps -q) 2>/dev/null || true

      - name: Upload Aspire logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aspire-logs
          path: |
            /tmp/aspire.log
            /tmp/diag/
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/test-results/
            client/apps/shell-e2e/playwright-report/
            client/dist/.playwright/
          # The Nx playwright executor writes attachments under .playwright,
          # which upload-artifact treats as a hidden dir and skips by default.
          include-hidden-files: true
          retention-days: 14
